spring:
  datasource:
    url: jdbc:h2:mem:english_words_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  main:
    allow-bean-definition-overriding: true

app:
  jwt:
    secret: test-secret-for-english-words-backend
    expiration-ms: 3600000
  preset-word-book:
    enabled: false
    key: cet6-core
    name: 六级核心词汇
    description: 系统预设六级核心词汇，注册后可直接学习。
    resource: classpath:preset/cet6_core_words.csv
  dictionary:
    resource: classpath:dictionary/test_dictionary.csv
