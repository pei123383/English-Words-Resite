spring:
  datasource:
    url: jdbc:h2:mem:english_words_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  main:
    allow-bean-definition-overriding: true

app:
  jwt:
    secret: test-secret-for-english-words-backend
    expiration-ms: 3600000
