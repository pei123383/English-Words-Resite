server:
  port: ${PORT:8080}

spring:
  application:
    name: english-words-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/english_words?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

app:
  jwt:
    secret: ${JWT_SECRET:english-words-development-secret-change-me-before-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
